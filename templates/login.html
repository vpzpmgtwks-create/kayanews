<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول — نشرة السوق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="login-screen">
    <form class="login-card" method="post" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <div class="mark">م</div>
      <h1 class="display">نشرة السوق</h1>
      <p>تقرير السوق اليومي — يرجى إدخال كلمة السر للمتابعة</p>

      {% if error %}<div class="login-err">{{ error }}</div>{% endif %}

      <div class="field">
        <label for="password">كلمة السر</label>
        <input type="password" id="password" name="password" inputmode="numeric"
               autocomplete="current-password" autofocus placeholder="••••">
      </div>
      <button type="submit" class="btn-gold">دخول</button>
    </form>
  </div>
  <script>
    // Freeze continuous CSS animations while the tab is hidden (saves CPU and
    // keeps background/headless renders from staying "busy" forever).
    (function () {
      function syncStill() {
        document.body.classList.toggle("still", document.hidden);
      }
      syncStill();
      document.addEventListener("visibilitychange", syncStill);
    })();
  </script>
</body>
</html>
