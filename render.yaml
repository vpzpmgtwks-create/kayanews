services:
  - type: web
    name: market-brief
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /login
    envVars:
      - key: MB_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.8
      # A strong random session key is generated by Render (never in git).
      - key: MB_SECRET_KEY
        generateValue: true
      # Set your own strong entry password in the Render dashboard.
      - key: MB_PASSWORD
        sync: false
