services:
  - type: web
    name: kayanews
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: MB_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.8
